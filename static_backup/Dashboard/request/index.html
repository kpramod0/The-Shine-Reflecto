<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header (Injected by script.js) -->
  <div id="site-header"></div>

  <main class="request-page">
    <h1 class="page-title">Request Dashboard</h1>

    <div class="request-container">
      <div class="request-card" id="addRequest">
        <h2>Add Request</h2>
        <p>Create and submit a new request</p>
      </div>

      <div class="request-card" id="requestResponse">
        <h2>Request Response</h2>
        <p>View and track responses to your requests</p>
      </div>
    </div>
  </main>

  <!-- Footer (Injected by script.js) -->
  <div id="site-footer"></div>

  <script src="script.js" defer></script>
</body>
</html>
